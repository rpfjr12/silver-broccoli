name: Generate Daily Weird Facts Video

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: daily-weird-facts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ImageMagick and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends imagemagick fonts-dejavu-core

      - name: Install pure Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate daily video
        run: |
          python main.py --output output

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          if git diff --cached --quiet; then
            echo "No new generated output to commit."
          else
            git commit -m "Generate daily weird facts video"
            git push
          fi
