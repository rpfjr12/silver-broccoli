name: Full Finished YouTube Video

on:
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  build-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-slugify gTTS pillow openai

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate script, audio, thumbnail, and video
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUM_VIDEOS: 1
        run: |
          python -u youtube_full_pipeline.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-output
          path: output/**
