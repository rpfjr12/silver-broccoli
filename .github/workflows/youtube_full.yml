name: Full Finished YouTube Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Video topic"
        required: true
        type: string

permissions:
  contents: read
  models: read

jobs:
  build-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
      # openai stays because the GitHub Models client uses the same library
        run: |
          python -m pip install --upgrade pip
          pip install openai python-slugify gTTS pillow

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate script, audio, thumbnail, and video
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ inputs.topic }}
        run: |
          python youtube_full_pipeline.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-output-${{ inputs.topic }}
          path: output/
